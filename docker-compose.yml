version: '3.9'

services:
  # ── PostgreSQL ────────────────────────────────────────────────────
  postgres:
    image: postgres:16-alpine
    container_name: taj_postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER:     ${DB_USERNAME:-postgres}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-postgres}
      POSTGRES_DB:       ${DB_NAME:-taj_erp}
    ports:
      - '5432:5432'
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U ${DB_USERNAME:-postgres}']
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - taj_network

  # ── Redis ─────────────────────────────────────────────────────────
  redis:
    image: redis:7-alpine
    container_name: taj_redis
    restart: unless-stopped
    command: redis-server --appendonly yes --requirepass ${REDIS_PASSWORD:-}
    ports:
      - '6379:6379'
    volumes:
      - redis_data:/data
    healthcheck:
      test: ['CMD', 'redis-cli', 'ping']
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - taj_network

  # ── Backend (NestJS) ──────────────────────────────────────────────
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: taj_backend
    restart: unless-stopped
    environment:
      NODE_ENV:           ${NODE_ENV:-production}
      PORT:               3001
      DB_HOST:            postgres
      DB_PORT:            5432
      DB_USERNAME:        ${DB_USERNAME:-postgres}
      DB_PASSWORD:        ${DB_PASSWORD:-postgres}
      DB_NAME:            ${DB_NAME:-taj_erp}
      DB_SYNCHRONIZE:     ${DB_SYNCHRONIZE:-false}
      REDIS_HOST:         redis
      REDIS_PORT:         6379
      REDIS_PASSWORD:     ${REDIS_PASSWORD:-}
      JWT_SECRET:         ${JWT_SECRET}
      JWT_ACCESS_EXPIRY:  ${JWT_ACCESS_EXPIRY:-15m}
      JWT_REFRESH_SECRET: ${JWT_REFRESH_SECRET}
      JWT_REFRESH_EXPIRY: ${JWT_REFRESH_EXPIRY:-7d}
      CORS_ORIGINS:       ${CORS_ORIGINS:-http://localhost:3000,http://nginx}
    ports:
      - '3001:3001'
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ['CMD-SHELL', 'wget -qO- http://localhost:3001/health || exit 1']
      interval: 20s
      timeout: 10s
      start_period: 30s
      retries: 3
    networks:
      - taj_network

  # ── Frontend (Next.js) ────────────────────────────────────────────
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        # Rewrite vers /api/* géré par Next.js → backend via réseau Docker
        NEXT_PUBLIC_API_URL: http://backend:3001
    container_name: taj_frontend
    restart: unless-stopped
    environment:
      NODE_ENV:               ${NODE_ENV:-production}
      NEXT_PUBLIC_API_URL:    http://backend:3001
      # URL visible depuis le navigateur (utilisée côté client)
      NEXT_PUBLIC_APP_URL:    ${APP_URL:-http://localhost}
    ports:
      - '3000:3000'
    depends_on:
      backend:
        condition: service_healthy
    healthcheck:
      test: ['CMD-SHELL', 'wget -qO- http://localhost:3000/ || exit 1']
      interval: 30s
      timeout: 10s
      start_period: 20s
      retries: 3
    networks:
      - taj_network

  # ── Nginx (reverse proxy) ─────────────────────────────────────────
  nginx:
    image: nginx:1.27-alpine
    container_name: taj_nginx
    restart: unless-stopped
    ports:
      - '80:80'
      # - '443:443'   # décommenter avec un certificat TLS
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/conf.d/default.conf:ro
      # - ./nginx/certs:/etc/nginx/certs:ro   # certificats TLS
    depends_on:
      frontend:
        condition: service_healthy
      backend:
        condition: service_healthy
    networks:
      - taj_network

volumes:
  postgres_data:
    driver: local
  redis_data:
    driver: local

networks:
  taj_network:
    driver: bridge
